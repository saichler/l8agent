// l8agent.proto defines the types for the Layer 8 AI Agent shared library.
// These types are used by all Layer 8 projects that integrate the AI agent.

syntax = "proto3";

package l8agent;

option go_package = "./types/l8agent";

import "l8api.proto";

// L8AgentConversation - Prime Object (metadata only, no messages)
// Stored by internal OrmService, not exposed via web API directly.
// Passes Prime Object test: independent lifecycle, queried directly.
message L8AgentConversation {
    string conversation_id = 1;
    string user_id = 2;
    string title = 3;
    int32 status = 4;                    // L8AgentConvoStatus enum
    int64 created_at = 5;
    int64 updated_at = 6;
}

message L8AgentConversationList {
    repeated L8AgentConversation list = 1;
    l8api.L8MetaData metadata = 2;
}

// L8AgentChatMessage - Prime Object
// Individual chat message, stored separately for efficiency.
// Stored by internal OrmService, not exposed via web API directly.
message L8AgentChatMessage {
    string conversation_id = 1;          // FK to conversation
    int32 sequence = 2;                  // Order within conversation
    bool is_llm = 3;                     // true = assistant, false = user
    string message = 4;                  // Message content
    repeated string allowed_modules = 5; // Modules context (for user messages)
    int64 timestamp = 6;
    int32 token_count = 7;              // LLM token usage (for assistant messages)
}

message L8AgentChatMessageList {
    repeated L8AgentChatMessage list = 1;
    l8api.L8MetaData metadata = 2;
}

// L8AgentChatConversation - Facade/pseudo model (NOT stored directly)
// Assembled by AgntChat facade service from L8AgentConversation + L8AgentChatMessage.
// This is the model exposed to the web API and UI.
message L8AgentChatConversation {
    string conversation_id = 1;
    string user_id = 2;
    string title = 3;
    int32 status = 4;                    // L8AgentConvoStatus enum
    repeated L8AgentChatMessage messages = 5;
    int64 created_at = 6;
    int64 updated_at = 7;
}

message L8AgentChatConversationList {
    repeated L8AgentChatConversation list = 1;
    l8api.L8MetaData metadata = 2;
}

// L8AgentPrompt - Prime Object
// Passes Prime Object test: independent lifecycle, queried across all users,
// reusable templates not tied to a single conversation
message L8AgentPrompt {
    string prompt_id = 1;
    string name = 2;
    string description = 3;
    string system_prompt = 4;            // The prompt template text
    int32 category = 5;                  // L8AgentPromptCategory enum
    int32 status = 6;                    // L8AgentPromptStatus enum
    repeated string allowed_modules = 7; // Module keys the prompt can access
    string created_by = 8;
}

message L8AgentPromptList {
    repeated L8AgentPrompt list = 1;
    l8api.L8MetaData metadata = 2;
}

// Enums
enum L8AgentConvoStatus {
    L8_AGENT_CONVO_STATUS_UNSPECIFIED = 0;
    L8_AGENT_CONVO_STATUS_ACTIVE = 1;
    L8_AGENT_CONVO_STATUS_ARCHIVED = 2;
}

enum L8AgentPromptCategory {
    L8_AGENT_PROMPT_CATEGORY_UNSPECIFIED = 0;
    L8_AGENT_PROMPT_CATEGORY_GENERAL = 1;
    L8_AGENT_PROMPT_CATEGORY_REPORTING = 2;
    L8_AGENT_PROMPT_CATEGORY_WORKFLOW = 3;
    L8_AGENT_PROMPT_CATEGORY_ANALYSIS = 4;
}

enum L8AgentPromptStatus {
    L8_AGENT_PROMPT_STATUS_UNSPECIFIED = 0;
    L8_AGENT_PROMPT_STATUS_ACTIVE = 1;
    L8_AGENT_PROMPT_STATUS_INACTIVE = 2;
}
